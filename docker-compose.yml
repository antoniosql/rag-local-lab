name: taller-rag-local

services:
  ollama:
    image: ollama/ollama
    container_name: taller-rag-local-ollama
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"
    environment:
      OLLAMA_NO_CLOUD: "1"
      OLLAMA_KEEP_ALIVE: "10m"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant
    container_name: taller-rag-local-qdrant
    ports:
      - "127.0.0.1:${QDRANT_PORT:-6333}:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  ollama_data:
    name: taller-rag-local_ollama_data
  qdrant_data:
    name: taller-rag-local_qdrant_data
